<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Insights · Status Update · May 2026</title>
<link rel="stylesheet" href="assets/styles.css">
<style>
  body { background: linear-gradient(180deg, #060A14 0%, #0a0f24 60%, #160e2c 100%); }

  .cover-hero {
    height: 100vh; padding: 80px 3rem 80px;
    display: grid; grid-template-columns: 1.5fr 1fr; gap: 3rem;
    position: relative; z-index: 2; max-width: 1500px; margin: 0 auto;
    align-items: center;
  }
  .cover-bg-text {
    position: absolute; top: 50%; right: -3%; transform: translateY(-50%);
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600; font-style: italic;
    font-size: clamp(14rem, 28vw, 30rem); line-height: 1;
    background: linear-gradient(135deg, var(--cyan) 0%, var(--violet) 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    opacity: 0.07; pointer-events: none; user-select: none;
    letter-spacing: -0.04em; z-index: 1;
  }

  .cover-left { position: relative; z-index: 3; }
  .cover-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.1rem; letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--cyan); margin-bottom: 2rem;
    display: flex; align-items: center; gap: 1.4rem;
  }
  .cover-eyebrow::before {
    content: ''; display: block; width: 80px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan));
  }
  .cover-title {
    font-family: 'Inter', sans-serif;
    font-weight: 200; font-size: clamp(5rem, 11vw, 9rem);
    line-height: 0.92; letter-spacing: -0.045em; color: var(--dust);
  }
  .cover-title .strong { font-weight: 800; color: var(--dust); }
  .cover-title .serif {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500; font-style: italic;
    background: linear-gradient(135deg, var(--cyan) 0%, var(--violet) 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .cover-subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-size: clamp(1.8rem, 2.6vw, 2.6rem);
    color: var(--dust-dim); margin-top: 1.8rem; max-width: 820px;
    line-height: 1.35;
  }
  .cover-meta {
    margin-top: 3rem; padding-top: 1.6rem;
    border-top: 1px solid rgba(95, 212, 255, 0.22);
    display: flex; gap: 3rem;
  }
  .cover-meta .lbl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--violet); margin-bottom: 0.5rem;
  }
  .cover-meta .val { font-size: 1.4rem; color: var(--dust); font-weight: 500; }

  /* ── Right pane: signal orb (radar easter egg) ── */
  .cover-right {
    position: relative; z-index: 3;
    display: flex; align-items: center; justify-content: center;
  }
  .orb-stage {
    position: relative;
    width: 100%; height: 420px;
    display: flex; align-items: center; justify-content: center;
  }
  .orb {
    width: 180px; height: 180px;
    position: relative; z-index: 4;
    cursor: pointer;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.5) 0%, var(--cyan) 25%, var(--violet-deep) 78%, #1a0a3c 100%);
    box-shadow:
      0 0 60px rgba(95, 212, 255, 0.55),
      0 0 120px rgba(192, 132, 252, 0.35),
      inset -22px -32px 56px rgba(0,0,0,0.45);
    animation: orbBreathe 4.2s ease-in-out infinite;
    transition: transform 0.32s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes orbBreathe {
    0%, 100% { transform: scale(1); filter: brightness(1); }
    50%      { transform: scale(1.06); filter: brightness(1.12); }
  }
  .orb-ring {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border: 1px solid rgba(95, 212, 255, 0.28);
    border-radius: 50%;
    pointer-events: none; z-index: 2;
  }
  .orb-ring.r1 { width: 250px; height: 250px; animation: ringRot 14s linear infinite; }
  .orb-ring.r2 { width: 330px; height: 330px; border-color: rgba(192, 132, 252, 0.22); animation: ringRot 22s linear infinite reverse; }
  .orb-ring.r3 { width: 410px; height: 410px; border-color: rgba(95, 212, 255, 0.12); animation: ringRot 32s linear infinite; }
  @keyframes ringRot { to { transform: translate(-50%, -50%) rotate(360deg); } }

  /* orbiting satellites — sit on rings, give the radar feel */
  .orb-sat {
    position: absolute; top: 50%; left: 50%;
    width: 12px; height: 12px;
    margin-left: -6px; margin-top: -6px;
    border-radius: 50%; background: var(--cyan);
    box-shadow: 0 0 14px var(--cyan);
    transform-origin: 6px 6px;
    pointer-events: none; z-index: 3;
  }
  .orb-sat.s1 { animation: orbit125 6s linear infinite; }
  .orb-sat.s2 {
    width: 9px; height: 9px; margin-left: -4.5px; margin-top: -4.5px;
    background: var(--violet); box-shadow: 0 0 12px var(--violet);
    transform-origin: 4.5px 4.5px;
    animation: orbit165 9.5s linear infinite reverse;
  }
  .orb-sat.s3 {
    width: 6px; height: 6px; margin-left: -3px; margin-top: -3px;
    background: #fff; box-shadow: 0 0 10px var(--cyan-bright);
    transform-origin: 3px 3px;
    animation: orbit205 13s linear infinite;
  }
  @keyframes orbit125 { from { transform: rotate(0deg) translateX(125px); } to { transform: rotate(360deg) translateX(125px); } }
  @keyframes orbit165 { from { transform: rotate(0deg) translateX(165px); } to { transform: rotate(360deg) translateX(165px); } }
  @keyframes orbit205 { from { transform: rotate(0deg) translateX(205px); } to { transform: rotate(360deg) translateX(205px); } }

  .orb-hint {
    position: absolute; bottom: 4px;
    left: 50%; transform: translateX(-50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.95rem; color: var(--dust-faint);
    letter-spacing: 0.22em; text-transform: uppercase;
    white-space: nowrap;
  }

  @keyframes radarRing {
    to { transform: translate(-50%, -50%) scale(24); opacity: 0; }
  }

  .cover-foot {
    position: fixed; bottom: 1.4rem; left: 0; right: 0;
    text-align: center; z-index: 100;
    font-family: 'JetBrains Mono', monospace;
    font-size: 1rem; color: var(--dust-faint);
    letter-spacing: 0.22em; text-transform: uppercase;
  }
  .cover-foot a { color: var(--cyan); border-bottom: 1px dotted var(--cyan); padding-bottom: 2px; }

  @media (max-width: 920px) {
    .cover-hero { grid-template-columns: 1fr; padding-top: 80px; }
    .cover-right { display: none; }
    .cover-bg-text { font-size: 12rem; }
  }
</style>
</head>
<body>

<canvas class="bg-canvas" id="constellation"></canvas>

<nav class="topnav">
  <div class="logo">
    <span class="a">Adobe</span>
    <span class="sep">/</span>
    <span>Digital Insights</span>
  </div>
  <div class="slide-counter">COVER · 0 / 6</div>
  <div class="topnav-actions">
    <a class="nav-link" href="01-what.html">Begin →</a>
  </div>
</nav>

<aside class="side-dots">
  <a href="index.html" class="current" data-label="Cover"></a>
  <a href="01-what.html" data-label="1. What it is"></a>
  <a href="01b-report.html" data-label="2. The report"></a>
  <a href="04-demand.html" data-label="3. Adoption"></a>
  <a href="02-signals.html" data-label="4. Deal signals"></a>
  <a href="03-summit.html" data-label="5. Summit"></a>
  <a href="05-roadmap.html" data-label="6. Roadmap"></a>
</aside>

<main>
  <section class="cover-hero">
    <div class="cover-bg-text reveal">DI</div>

    <div class="cover-left">
      <div class="cover-eyebrow reveal reveal-1">STATUS UPDATE · MAY 2026</div>

      <h1 class="cover-title reveal reveal-2">
        Digital<br>
        <span class="serif">Insights.</span>
      </h1>

      <p class="cover-subtitle reveal reveal-3">
        The intelligence layer for every<br>customer conversation.
      </p>
    </div>

    <div class="cover-right">
      <div class="orb-stage reveal reveal-2">
        <div class="orb-ring r3"></div>
        <div class="orb-ring r2"></div>
        <div class="orb-ring r1"></div>
        <div class="orb-sat s1"></div>
        <div class="orb-sat s2"></div>
        <div class="orb-sat s3"></div>
        <div class="orb" id="orb"></div>
        <div class="orb-hint">click the signal</div>
      </div>
    </div>
  </section>

  <div class="cover-foot">
    Press <a href="01-what.html">→ to begin</a>
  </div>
</main>

<script src="assets/effects.js"></script>
<script>
  startConstellation('constellation', { density: 1.1 });
  attachCursorGlow('rgba(95, 212, 255, 0.05)');

  const orb = document.getElementById('orb');
  if (orb) {
    orb.addEventListener('click', () => {
      radarPing(orb);
      orb.style.animation = 'none';
      orb.style.transform = 'scale(0.85)';
      setTimeout(() => {
        orb.style.transform = 'scale(1.18)';
        setTimeout(() => { orb.style.transform = ''; orb.style.animation = ''; }, 240);
      }, 120);
    });
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === ' ') location.href = '01-what.html';
  });
</script>

</body>
</html>
