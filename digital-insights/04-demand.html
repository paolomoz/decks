  .chart-card {
    flex: 1; min-height: 0;

    background: linear-gradient(90deg, var(--cyan), var(--violet));
  }
  .chart-head {
    display: flex; align-items: baseline; justify-content: space-between;

  .chart-title {

    font-size: clamp(0.85rem, 1vw, 1rem); letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--dust-faint);

  .chart-svg-wrap { flex: 1; min-height: 0; }
  .chart-svg-wrap svg { width: 100%; height: 100%; display: block; }

  /* ── 2 stats below the chart ── */
  .adopt-extra {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 1.2rem; margin-top: 1rem; flex-shrink: 0;
  }
  .extra-card {
    padding: 1.1rem 1.4rem;
    border-left: 4px solid var(--cyan);
    background: rgba(95, 212, 255, 0.06);
    border-radius: 0 8px 8px 0;
    display: flex; align-items: center; gap: 1.4rem;
  }
  .extra-card.violet { border-left-color: var(--violet); background: rgba(192, 132, 252, 0.06); }
  .extra-num {
    font-family: 'Inter', sans-serif;
    font-weight: 200; font-size: clamp(3.4rem, 5.5vw, 4.6rem);
    line-height: 0.9; letter-spacing: -0.05em;
    color: var(--cyan);
    flex-shrink: 0;
  }
  .extra-card.violet .extra-num { color: var(--violet); }
  .extra-meta { display: flex; flex-direction: column; }
  .extra-lbl {
    font-family: 'Inter', sans-serif;
    font-size: clamp(1.1rem, 1.4vw, 1.4rem);
    font-weight: 700; color: var(--dust); line-height: 1.15;

<script src="assets/effects.js"></script>
<script>
  startConstellation('constellation', { density: 0.55 });

  /* ── line chart ─────────────────────────── */
  (function buildChart() {
    const svg = document.getElementById('growthChart');
    const W = 1200, H = 460;
    const M = { top: 50, right: 70, bottom: 70, left: 90 };
    const cw = W - M.left - M.right;
    const ch = H - M.top - M.bottom;

    /* data */
    const data = [
      { m: 'Jun', y: 2025, v: 10,    label: '10',     hi: true  },
      { m: 'Jul', y: 2025, v: 25,    label: null,     hi: false },
      { m: 'Aug', y: 2025, v: 45,    label: null,     hi: false },
      { m: 'Sep', y: 2025, v: 75,    label: null,     hi: false },
      { m: 'Oct', y: 2025, v: 110,   label: null,     hi: false },
      { m: 'Nov', y: 2025, v: 145,   label: null,     hi: false },
      { m: 'Dec', y: 2025, v: 185,   label: '185',    hi: true  },
      { m: 'Jan', y: 2026, v: 300,   label: '300',    hi: true  },
      { m: 'Feb', y: 2026, v: 600,   label: '600',    hi: true  },
      { m: 'Mar', y: 2026, v: 1100,  label: null,     hi: false },
      { m: 'Apr', y: 2026, v: 1900,  label: null,     hi: false },
      { m: 'May', y: 2026, v: 3000,  label: '~3,000', hi: true  }
    ];
    const N = data.length;
    const maxV = 3000;

    const xAt = i => M.left + (i / (N - 1)) * cw;
    const yAt = v => M.top + (1 - v / maxV) * ch;

    /* split between Dec 2025 (i=6) and Jan 2026 (i=7) */
    const splitX = (xAt(6) + xAt(7)) / 2;

    /* year band backgrounds */
    let bands = '';
    bands += `<rect x="${M.left}" y="${M.top}" width="${splitX - M.left}" height="${ch}" fill="rgba(95, 212, 255, 0.05)"/>`;
    bands += `<rect x="${splitX}" y="${M.top}" width="${W - M.right - splitX}" height="${ch}" fill="rgba(192, 132, 252, 0.07)"/>`;
    /* split divider */
    bands += `<line x1="${splitX}" y1="${M.top}" x2="${splitX}" y2="${M.top + ch}" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-dasharray="6 6"/>`;
    /* year labels at the top of each band */
    const y2025X = (M.left + splitX) / 2;
    const y2026X = (splitX + W - M.right) / 2;
    bands += `<text x="${y2025X}" y="${M.top - 18}" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="22" font-weight="700" fill="#5fd4ff" letter-spacing="0.18em">2025</text>`;
    bands += `<text x="${y2026X}" y="${M.top - 18}" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="22" font-weight="700" fill="#c084fc" letter-spacing="0.18em">2026</text>`;

    /* y-axis gridlines */
    const ticks = [0, 1000, 2000, 3000];
    let grid = '';
    ticks.forEach(t => {
      const y = yAt(t);
      grid += `<line x1="${M.left}" y1="${y}" x2="${W - M.right}" y2="${y}" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>`;
      grid += `<text x="${M.left - 18}" y="${y + 7}" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="20" fill="rgba(244,234,210,0.55)">${t.toLocaleString()}</text>`;
    });

    /* x-axis labels — every month, readable */
    let xlabels = '';
    data.forEach((d, i) => {
      const x = xAt(i);
      xlabels += `<text x="${x}" y="${H - M.bottom + 32}" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="20" font-weight="600" fill="rgba(244,234,210,0.7)" letter-spacing="0.06em">${d.m}</text>`;
    });

    /* smooth path via Catmull-Rom → cubic Bezier */
    const points = data.map((d, i) => [xAt(i), yAt(d.v)]);
    function smoothPath(pts) {
      const t = 0.22;
      let d = `M ${pts[0][0]},${pts[0][1]}`;
      for (let i = 0; i < pts.length - 1; i++) {
        const p0 = pts[i - 1] || pts[i];
        const p1 = pts[i];
        const p2 = pts[i + 1];
        const p3 = pts[i + 2] || p2;
        const c1x = p1[0] + (p2[0] - p0[0]) * t;
        const c1y = p1[1] + (p2[1] - p0[1]) * t;
        const c2x = p2[0] - (p3[0] - p1[0]) * t;
        const c2y = p2[1] - (p3[1] - p1[1]) * t;
        d += ` C ${c1x},${c1y} ${c2x},${c2y} ${p2[0]},${p2[1]}`;
      }
      return d;
    }
    const linePath = smoothPath(points);
    const areaPath = linePath + ` L ${points[N - 1][0]},${H - M.bottom} L ${points[0][0]},${H - M.bottom} Z`;

    /* points + value labels */
    let dots = '';
    data.forEach((d, i) => {
      const x = xAt(i), y = yAt(d.v);
      if (d.hi) {
        dots += `<circle cx="${x}" cy="${y}" r="11" fill="#060A14" stroke="url(#strokeGrad)" stroke-width="3.5"/>`;
        const tx = i === N - 1 ? x - 18 : (i === 0 ? x + 18 : x);
        const ty = y - 22;
        const anchor = i === N - 1 ? 'end' : (i === 0 ? 'start' : 'middle');
        dots += `<text x="${tx}" y="${ty}" text-anchor="${anchor}" font-family="Inter, sans-serif" font-size="28" font-weight="800" fill="#f4ead2">${d.label}</text>`;
      } else {
        dots += `<circle cx="${x}" cy="${y}" r="4.5" fill="rgba(95,212,255,0.6)"/>`;
      }
    });

    /* assemble */
    svg.innerHTML = `
      <defs>
        <linearGradient id="strokeGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#5fd4ff"/>
          <stop offset="100%" stop-color="#c084fc"/>
        </linearGradient>
        <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="#c084fc" stop-opacity="0.42"/>
          <stop offset="60%" stop-color="#5fd4ff" stop-opacity="0.16"/>
          <stop offset="100%" stop-color="#5fd4ff" stop-opacity="0"/>
        </linearGradient>
      </defs>
      ${bands}
      ${grid}
      ${xlabels}
      <path d="${areaPath}" fill="url(#areaGrad)"/>
      <path id="growthLine" d="${linePath}" fill="none" stroke="url(#strokeGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      ${dots}
    `;

    /* draw-on animation */
    const line = document.getElementById('growthLine');
    if (line && line.getTotalLength) {
      const len = line.getTotalLength();
      line.style.strokeDasharray = len;
      line.style.strokeDashoffset = len;
      requestAnimationFrame(() => {
        line.style.transition = 'stroke-dashoffset 1.8s cubic-bezier(0.22, 1, 0.36, 1)';
        line.style.strokeDashoffset = 0;
      });
    }
  })();

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === ' ') location.href = '02-signals.html';
    if (e.key === 'ArrowLeft') location.href = '01b-report.html';
  });
</script>
