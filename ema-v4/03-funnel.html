<title>04 · PLG Funnel · EMA</title>
<link rel="stylesheet" href="assets/styles.css">
<style>
  body {
    background:
      radial-gradient(ellipse at 80% 20%, rgba(95, 212, 255, 0.08) 0%, transparent 55%),
      radial-gradient(ellipse at 10% 80%, rgba(146, 86, 217, 0.07) 0%, transparent 55%),
      linear-gradient(180deg, #050b18 0%, #0a1326 100%);
  }
  .bg-grid-dataviz {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(95, 212, 255, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(95, 212, 255, 0.04) 1px, transparent 1px);
    background-size: 56px 56px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
  }

  .funnel-eyebrow { color: var(--term-cyan); }
  .funnel-title .accent { color: var(--term-cyan); text-shadow: 0 0 22px rgba(95, 212, 255, 0.4); }

  .funnel-stages {
    display: flex; flex-direction: column; gap: 0.8rem;
    flex: 1; min-height: 0; justify-content: center;
  }
  .stg {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 2rem;
    align-items: center;
    height: 70px;
  }
  .stg .bar {
    height: 70px; position: relative; border-radius: 4px;
    background: linear-gradient(90deg, rgba(95, 212, 255, 0.15) 0%, rgba(95, 212, 255, 0.04) 100%);
    border: 1px solid rgba(95, 212, 255, 0.25); overflow: hidden;
    display: flex; align-items: center; padding: 0 1.6rem;
  }
  .stg .fill {
    position: absolute; inset: 0; right: auto;
    height: 100%; background: linear-gradient(90deg, var(--term-cyan), rgba(95, 212, 255, 0.45));
    transform-origin: left; transform: scaleX(0);
    animation: fillGrow 1.4s 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    width: 100%;
  }
  @keyframes fillGrow { to { transform: scaleX(var(--scale, 1)); } }
  .stg .label {
    position: relative; z-index: 2;
    font-family: 'Inter', sans-serif;
    font-weight: 700; font-size: clamp(1.6rem, 2.4vw, 2.2rem);
    color: var(--dust); letter-spacing: -0.02em;
  }
  .stg .count {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(2.4rem, 3.5vw, 3.2rem); font-weight: 700;
    color: var(--term-cyan); letter-spacing: -0.02em;
    text-shadow: 0 0 16px rgba(95, 212, 255, 0.45);
    min-width: 130px; text-align: right;
  }

  .conv-row {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 2px; background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.08);
    margin-top: 1.4rem;
  }
  .cv {
    padding: 1.4rem 1.6rem; background: rgba(6, 10, 20, 0.7);
  }
  .cv .lbl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.95rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--dust-faint); margin-bottom: 0.5rem; font-weight: 600;
  }
  .cv .val {
    font-size: clamp(2.6rem, 4vw, 3.6rem); font-weight: 800;
    color: var(--term-cyan); font-family: 'Inter', sans-serif;
    letter-spacing: -0.04em; line-height: 1;
  }
  .cv .delta {
    font-size: 0.95rem; margin-top: 0.4rem;
    font-family: 'JetBrains Mono', monospace; letter-spacing: 0.1em;
  }
</style>
</head>
