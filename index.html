<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>decks · paolomoz</title>
<style>
  :root { --ink: #0a0d1a; --ink2: #1a1410; --amber: #FFD98A; --dust: #f4ead2; --dust-dim: #c5b88f; --dust-faint: #8a7e57; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: linear-gradient(180deg, var(--ink) 0%, #0c1226 60%, var(--ink2) 100%);
    color: var(--dust);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 2rem;
  }
  .wrap { max-width: 820px; width: 100%; }
  .eyebrow {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 0.72rem; letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--amber); margin-bottom: 1.4rem;
    display: flex; align-items: center; gap: 1rem;
  }
  .eyebrow::before { content: ''; display: block; width: 50px; height: 1px; background: var(--amber); opacity: 0.4; }
  h1 {
    font-weight: 200; font-size: clamp(2rem, 5vw, 3.4rem);
    line-height: 1; letter-spacing: -0.04em;
    margin-bottom: 1rem;
  }
  h1 .strong { font-weight: 800; }
  h1 .serif {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic; font-weight: 500; color: var(--amber);
  }
  p.lede {
    color: var(--dust-dim); font-size: 1.05rem; max-width: 620px;
    margin-bottom: 2rem; line-height: 1.5;
  }
  .deck-list { display: grid; gap: 0.8rem; }
  a.deck {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.1rem 1.4rem;
    background: rgba(255, 217, 138, 0.04);
    border: 1px solid rgba(255, 217, 138, 0.18);
    border-radius: 6px;
    color: var(--dust); text-decoration: none;
    transition: all 0.25s;
  }
  a.deck:hover {
    background: rgba(255, 217, 138, 0.09);
    border-color: var(--amber);
    transform: translateX(4px);
  }
  .deck-title { font-weight: 700; font-size: 1.05rem; margin-bottom: 0.2rem; }
  .deck-meta { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--dust-faint); letter-spacing: 0.1em; text-transform: uppercase; }
  .arrow { color: var(--amber); font-size: 1.4rem; }
  footer {
    margin-top: 3rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem; color: var(--dust-faint);
    letter-spacing: 0.18em; text-transform: uppercase;
  }
  footer a { color: var(--amber); border-bottom: 1px dotted var(--amber); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">Paolo Mottadelli · Adobe</div>
    <h1>
      <span class="serif">decks</span><span class="strong">.</span>
    </h1>
    <p class="lede">A small collection of presentations.</p>

    <div class="deck-list">
      <a class="deck" href="ema-v4/">
        <div>
          <div class="deck-title">Experience Modernization Agent · Director Briefing (v4)</div>
          <div class="deck-meta">May 2026 · 8 slides · room-readable</div>
        </div>
        <span class="arrow">↗</span>
      </a>
      <a class="deck" href="ema/">
        <div>
          <div class="deck-title">Experience Modernization Agent · Director Briefing (v3)</div>
          <div class="deck-meta">May 2026 · 8 slides · cinematic</div>
        </div>
        <span class="arrow">↗</span>
      </a>
    </div>

    <footer>
      <a href="https://github.com/paolomoz/decks">github.com/paolomoz/decks</a>
    </footer>
  </div>
</body>
</html>
